name = "ai-gateway-demo"
main = "src/index.ts"
compatibility_date = "2025-07-01"

[[d1_databases]]
binding = "DB"
database_name = "ai-gateway-demo-db"
# Replace with YOUR D1 database id (`wrangler d1 create ai-gateway-demo-db`).
database_id = "09d3f7fd-0d72-4a8f-8e35-9f99934052d0"

[[durable_objects.bindings]]
name = "CREDIT_LEDGER"
class_name = "CreditLedger"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CreditLedger"]

# ── Public config (safe to commit) ───────────────────────────────────────────
# These are NOT secrets. The Supabase URL + anon (publishable) key are shipped to
# every browser by design. Replace ALL of them with your own project's values
# before deploying — otherwise your app authenticates against, and creates users
# in, the original demo's Supabase project. Secrets (API keys) are set separately
# via `wrangler secret put` — see .dev.vars.example.
[vars]
SUPABASE_JWKS_URL = "https://cdfcboqhirhadzykeeey.supabase.co/auth/v1/.well-known/jwks.json"
SUPABASE_PROJECT_URL = "https://cdfcboqhirhadzykeeey.supabase.co"
SUPABASE_ANON_KEY = "sb_publishable_L3tlauTO-QrKwseMijNGlQ_XiJAbSLR"
CREEM_PRODUCT_ID = "prod_vfOhDIXGlk1Dfkd8MT6AB"
